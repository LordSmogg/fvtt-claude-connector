name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build MCP server
        run: npm run build --workspace=mcp-server

      - name: Build Foundry module
        run: npm run build --workspace=fvtt-claude-connector

      - name: Package Foundry module
        run: |
          mkdir -p release
          cd fvtt-claude-connector
          zip -r ../release/fvtt-claude-connector.zip dist/ lang/ module.json
          cp module.json ../release/module.json

      - name: Publish MCP server to npm
        run: npm publish --workspace=mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/fvtt-claude-connector.zip
            release/module.json
          generate_release_notes: true
